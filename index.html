<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebProfit AI</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
<h1>🛍️ WebProfit AI</h1>
<p>La boutique intelligente qui te conseille avant d'acheter</p>
</header>

<section class="hero">

<h2>Trouve le produit parfait grâce à l'IA</h2>

<p>
Décris ton besoin, ton budget ou ton événement.
WebProfit AI te recommande les meilleurs produits.
</p>

</section>

<section class="ai-box">

<h2>🤖 Conseiller IA</h2>

<input
id="ai-input"
type="text"
placeholder="Ex : J'ai 5000 FCFA pour une fête samedi">

<button onclick="askAI()">
Analyser ma demande
</button>

<div id="ai-result"></div>

</section>

<section class="products">

<h2>🔥 Produits populaires</h2>

<div id="product-grid" class="product-grid">

</div>

</section>

<script src="app.js"></script>

</body>
</html>
