<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WebProfit AI - Boutique intelligente</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#f97316" />
</head>
<body>

    <!-- ===== HEADER AVEC RECHERCHE ===== -->
    <header class="app-header">
        <div class="header-top">
            <h1>🛍️ WebProfit AI</h1>
            <span class="badge-promo">🔥 Ventes Flash</span>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 Rechercher un produit..." onkeyup="searchProducts()" />
        </div>
    </header>

    <!-- ===== BANNIÈRE PROMO ===== -->
    <section class="banner-flash">
        <div class="banner-content">
            <span class="flash-icon">⚡</span>
            <span class="flash-title">VENTES FLASH - CHAQUE JOUR</span>
            <span class="flash-timer" id="countdown">01h:02m:55s</span>
        </div>
    </section>

    <!-- ===== CATÉGORIES EN GRILLE ===== -->
    <section class="categories-grid">
        <div class="category-item" onclick="filterProducts('Téléphones')">
            <span class="cat-icon">📱</span>
            <span>Téléphones</span>
        </div>
        <div class="category-item" onclick="filterProducts('Électronique')">
            <span class="cat-icon">💻</span>
            <span>Électronique</span>
        </div>
        <div class="category-item" onclick="filterProducts('Vêtements')">
            <span class="cat-icon">👕</span>
            <span>Vêtements</span>
        </div>
        <div class="category-item" onclick="filterProducts('Chaussures')">
            <span class="cat-icon">👟</span>
            <span>Chaussures</span>
        </div>
        <div class="category-item" onclick="filterProducts('Accessoires')">
            <span class="cat-icon">⌚</span>
            <span>Accessoires</span>
        </div>
        <div class="category-item" onclick="filterProducts('all')">
            <span class="cat-icon">📂</span>
            <span>Tout</span>
        </div>
    </section>

    <!-- ===== PRODUITS ===== -->
    <section class="products-section">
        <h2>🔥 Recommandé pour vous</h2>
        <div id="product-grid" class="product-grid"></div>
    </section>

    <!-- ===== MODALE PRODUIT ===== -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">✖</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- ===== NAVIGATION BASSE ===== -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navigateTo('home')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Accueil</span>
        </div>
        <div class="nav-item" onclick="navigateTo('categories')">
            <span class="nav-icon">📂</span>
            <span class="nav-label">Catégories</span>
        </div>
        <div class="nav-item" onclick="navigateTo('cart')">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Panier</span>
            <span class="nav-badge" id="cart-badge">0</span>
        </div>
        <div class="nav-item" onclick="navigateTo('favorites')">
            <span class="nav-icon">❤️</span>
            <span class="nav-label">Favoris</span>
        </div>
        <div class="nav-item" onclick="navigateTo('account')">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Compte</span>
        </div>
    </nav>

    <!-- ===== SCRIPTS ===== -->
    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script src="ai.js"></script>
    <script src="app.js"></script>
    <script>
        // Navigation
        function navigateTo(section) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            // Scroll en haut
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Mettre à jour le badge du panier
        function updateCartBadge() {
            const badge = document.getElementById('cart-badge');
            if (badge) {
                const count = document.getElementById('cart-count')?.textContent || '0';
                badge.textContent = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
            }
        }

        // Observer les changements du panier
        setInterval(updateCartBadge, 500);
        updateCartBadge();

        // Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./service-worker.js")
                .then(() => console.log("Service Worker installé"));
        }
    </script>
</body>
</html>
